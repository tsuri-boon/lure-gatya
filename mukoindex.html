  const j=new Date(now.getTime()+(now.getTimezoneOffset()+540)*60000);

  const end=new Date(j.getFullYear(), j.getMonth()+4, 0); // 翌々々月の0日=3ヶ月先の月末
  return end.getFullYear()+'-'+String(end.getMonth()+1).padStart(2,'0')+'-'+String(end.getDate()).padStart(2,'0');
}
const CFG={
  buri:{c:'#1FA9A0',sp:['ツバス','ハマチ','メジロ','ブリ'],
    col:{'ツバス':'#7ECFC8','ハマチ':'#FF6B35','メジロ':'#1FA9A0','ブリ':'#143246'},
    auc:'0.78',name:'ブリ系（ツバス・ハマチ・メジロ・ブリ）'},
  sawara:{c:'#0099CC',sp:['サゴシ','サワラ'],
    col:{'サゴシ':'#5BB8DD','サワラ':'#0099CC'},
    auc:'0.84',name:'サワラ系（サゴシ・サワラ）'}
};
let K='buri',cur=0;
const WD=['日','月','火','水','木','金','土'];
function rank(i){
  if(i>=80)return['絶好','この時期で最上位クラスの条件'];
  if(i>=60)return['狙い目','条件は整っている'];
  if(i>=40)return['ふつう','悪くはない'];
  if(i>=20)return['渋め','条件はいまひとつ'];
  return['低調','この時期の底'];
}
function moon(ma){const l=Math.abs(Math.cos(ma/29.53*2*Math.PI)),p=Math.round(l*100);
  return `<span class="moon" style="background:radial-gradient(circle,#FFC53D 0%,#FFC53D ${p}%,#dfeef4 ${p}%)"></span>`;}
function todayJST(){
  // 日本時間の今日の日付(YYYY-MM-DD)。UTCだと早朝に前日になるのを防ぐ
  const now=new Date();
  const jst=new Date(now.getTime()+(now.getTimezoneOffset()+540)*60000);
  return jst.getFullYear()+'-'+String(jst.getMonth()+1).padStart(2,'0')+'-'+String(jst.getDate()).padStart(2,'0');
}
function si(rows){const t=todayJST();const i=rows.findIndex(r=>r.d>=t);return i<0?0:i;}
function wxHtml(r){
  const cfg=CFG[K];
  const wx=(WX&&WX!=='fail')?WX[r.d]:null;
  const tide=`<div class="it"><div class="k">潮回り</div><div class="v" style="color:${cfg.c}">${r.t}</div></div>`;
  let temp,weather;
  if(wx){
    const w=WMO[wx.code]||{t:'—',i:'·'};
    temp=`<div class="it"><div class="k">気温</div><div class="v">${wx.tmax}°<span style="color:var(--c-sub);font-size:12px">/${wx.tmin}°</span></div></div>`;
    weather=`<div class="it"><div class="k">天気</div><div class="wx">${w.i}</div><div class="wxt">${w.t}</div></div>`;
  }else{
    // 取得前・失敗・8日目以降
    const dash=(WX==='fail'||WX===null)?'…':'—';
    temp=`<div class="it"><div class="k">気温</div><div class="v" style="color:var(--c-sub)">${dash}</div></div>`;
    weather=`<div class="it"><div class="k">天気</div><div class="v" style="color:var(--c-sub)">${dash}</div></div>`;
  }
  return tide+temp+weather;
}
function card(){
  const cfg=CFG[K],rows=D[K],base=si(rows),r=rows[base+cur];
  if(!r)return;
  const [rk,sub]=rank(r.i),dt=new Date(r.d);
  const rel=cur===0?'TODAY':cur===1?'TOMORROW':'';
  const mo=+r.d.slice(5,7),mx=D.mix[K][mo],bt=D.bait[mo];
  let mb='',ml='';
  if(mx.t>0)cfg.sp.forEach(s=>{const v=mx.c[s]||0;if(!v)return;
    mb+=`<div style="width:${v}%;background:${cfg.col[s]}">${v>=12?v:''}</div>`;
    ml+=`<span><i style="background:${cfg.col[s]}"></i>${s} ${v}%</span>`;});
  const bx={'多い':'アジ・イワシ等が濃い時期。青物が接岸しやすい','並':'ベイトは平年並み','少ない':'ベイトが薄めの時期'}[bt.lvl];
  document.getElementById('card').innerHTML=`
    <div class="l1"><div class="dt">${dt.getMonth()+1}/${dt.getDate()}<span class="wd">(${WD[dt.getDay()]})</span></div>${rel?`<div class="when">${rel}</div>`:''}</div>
    <div class="l2">
      <div class="gauge"><svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#dfeef4" stroke-width="7"/>
        <circle cx="50" cy="50" r="44" fill="none" stroke="${cfg.c}" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="${r.i/100*276} 276" transform="rotate(-90 50 50)" style="transition:.4s"/>
      </svg><div class="big num">${r.i}</div></div>
      <div class="rk"><div class="word">${rk}</div><div class="sub">${sub}</div><div class="scale">指数 ${r.i} / 100</div></div>
    </div>
    <div class="l3">${wxHtml(r)}</div>
    <div class="l4">
      <div class="row"><div class="rk2">この時期に上がる魚（過去実績）</div><div class="mixbar">${mb}</div><div class="mixleg">${ml}</div></div>
      <div class="row"><div class="rk2">ベイトの傾向（例年の${mo}月）</div>
        <div class="bait"><span class="baitLvl ${bt.lvl}">${bt.lvl}</span><span class="txt">${bx}</span></div></div>
    </div>`;
  document.getElementById('dots').innerHTML=rows.slice(base,base+7).map((_,i)=>`<i class="${i===cur?'on':''}"></i>`).join('');
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=6||!rows[base+cur+1];
}
function cal(){
  const cfg=CFG[K],rows=D[K],lim=calLimitJST(),months={};
  rows.forEach(r=>{if(r.d>lim)return;const k=r.d.slice(0,7);(months[k]=months[k]||[]).push(r);});
  let h='';
  Object.entries(months).forEach(([k,rs])=>{
    h+=`<div class="mon">${k.replace('-','.')}</div>
      <div class="wk"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div><div class="grid">`;
    const pad=new Date(rs[0].d).getDay();
    for(let i=0;i<pad;i++)h+='<div class="hc" style="border:none;background:transparent"></div>';
    rs.forEach(r=>{const on=r.i>=55,a=on?(0.4+0.6*(r.i-55)/45):1;
      const bg=on?`color-mix(in srgb,${cfg.c} ${Math.round(a*100)}%,#fff)`:'#fff';
      h+=`<div class="hc ${on?'hi':''}" style="background:${bg}" data-d="${r.d}" title="${r.d} 指数${r.i}"><span class="d">${r.d.slice(8)}</span><span class="iv">${r.i}</span></div>`;});
    h+='</div>';
  });
  h+='<div class="heatKey"><span>低</span><div class="kbar"></div><span>高</span></div>';
  document.getElementById('cal').innerHTML=h;
  document.querySelectorAll('.hc[data-d]').forEach(c=>c.onclick=()=>{
    const base=si(rows),i=rows.findIndex(r=>r.d===c.dataset.d)-base;
    if(i>=0&&i<7){cur=i;card();document.getElementById('deck').scrollIntoView({behavior:'smooth',block:'center'});}});
}
function render(){
  const cfg=CFG[K];
  document.documentElement.style.setProperty('--acc',cfg.c);
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('sel',b.dataset.k===K));
  cur=0;card();cal();
  document.getElementById('foot').innerHTML=`
    <b>指数の読み方</b><br>直近90日の中での相対的な釣れやすさの順位。100に近いほどこの時期で条件が良い日です。<br><br>
    <b>精度</b><br>${cfg.name}。検証AUC ${cfg.auc}。潮汐・季節・前年同時期の釣況とベイト実績から算出。直近の釣果は使っていません。<br><br>
    <b>注記</b><br>「この時期に上がる魚」「ベイトの傾向」は過去実績（2016/2019年以降）に基づく参考情報で、その日ピンポイントの予測ではありません。黒潮大蛇行終息（2025年4月）以降、ブリ系は減少傾向で指数は高めに出ることがあります。`;
}
document.getElementById('prev').onclick=()=>{if(cur>0){cur--;card();}};
document.getElementById('next').onclick=()=>{const rows=D[K],base=si(rows);if(cur<6&&rows[base+cur+1]){cur++;card();}};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{K=b.dataset.k;render();});
let x0=null;const dk=document.getElementById('deck');
dk.addEventListener('touchstart',e=>x0=e.touches[0].clientX,{passive:true});
dk.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;
  if(Math.abs(dx)>40){dx<0?document.getElementById('next').click():document.getElementById('prev').click();}x0=null;});
render();
loadWeather();
</script>
</body>
</html>
